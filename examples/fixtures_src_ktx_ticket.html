<!doctype html><html lang="ko"><head><meta charset="utf-8">
<style>
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;width:420px;margin:0;padding:20px;color:#111;background:#fff}
  .card{border:2px solid #003876;border-radius:8px;padding:18px 20px}
  .logo{color:#003876;font-size:20px;font-weight:bold;letter-spacing:1px}
  .type{color:#666;font-size:13px;margin-bottom:12px}
  .route{font-size:26px;font-weight:bold;margin:10px 0;color:#111}
  .arrow{color:#003876;margin:0 8px}
  table{width:100%;font-size:14px;border-collapse:collapse;margin-top:8px}
  td{padding:4px 0}.r{text-align:right;color:#333}.l{color:#666}
  .fare{border-top:1px dashed #999;margin-top:12px;padding-top:10px;font-size:15px}
  .amt{font-size:22px;font-weight:bold;color:#003876}
  .foot{font-size:11px;color:#999;margin-top:12px}
</style></head><body>
<div class="card">
  <div class="logo">KORAIL · KTX</div>
  <div class="type">고속열차 승차권 (영수증)</div>
  <div class="route">서울 <span class="arrow">→</span> 부산</div>
  <table>
    <tr><td class="l">열차편</td><td class="r">KTX 101</td></tr>
    <tr><td class="l">출발</td><td class="r">2026년 05월 14일 (수) 09:00</td></tr>
    <tr><td class="l">도착</td><td class="r">2026년 05월 14일 (수) 11:42</td></tr>
    <tr><td class="l">좌석</td><td class="r">7호차 12A (일반실)</td></tr>
  </table>
  <div class="fare">
    <table>
      <tr><td class="l">운임</td><td class="r">59,800 원</td></tr>
      <tr><td class="l">할인</td><td class="r">0 원</td></tr>
      <tr><td class="l amt">영수액</td><td class="r amt">59,800 원</td></tr>
    </table>
  </div>
  <div class="foot">※ 본 승차권은 테스트용 합성 문서입니다(실제 승차권·결제정보 아님).</div>
</div>
</body></html>
